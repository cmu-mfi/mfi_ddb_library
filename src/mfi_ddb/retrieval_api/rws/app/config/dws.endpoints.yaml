services:
  metadata_service:                     # service name is arbitrary, but should be unique across services
    url: "http://localhost:8001"        # (required) DWS server URL (protocol, host, port)
    topic_families:                     # (required) list of topic families that this service can handle; used for routing requests
    - mfi-v1.0-kv
    # topics:                                             # (optional) list of topics (wildcards allowed) 
    # - 'mfi-v1.0-kv/CMU/some/path/to/specific/topic/#'   # if 'topics' key is used, make sure to include all topics

  kv_service:
    url: "http://localhost:8002"  
    topic_families: 
    - mfi-v1.0-kv

  historian_service:
    url: "http://localhost:8004"  
    topic_families: 
    - mfi-v1.0-historian

  cfs_service:
    url: "http://localhost:8003"  
    topic_families: 
    - mfi-v1.0-blob
